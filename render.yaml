services:
  - type: web
    name: laudstack
    runtime: node
    region: oregon
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/auth.me
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: laudstack
          property: port
      # Add all remaining env vars in the Render dashboard
      # or reference the env.example file for the full list
